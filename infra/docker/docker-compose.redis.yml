services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: >
      redis-server
      --requirepass admin
      --appendonly yes
      --appendfilename appendonly.aof
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mcp_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "admin", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    name: mcp_redis_data

networks:
  mcp_network:
    external: true
